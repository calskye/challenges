<!DOCTYPE html>
<html>
<head>
  <title>Hike to Half Moon Bay from Stanford Campus</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <!-- GPX plugin -->
  <script src="https://unpkg.com/leaflet-gpx/gpx.js"></script>

  <style>
    body { margin: 0; }

  #map {
    height: 100vh;
  }

  #title {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 1000;

    background: rgba(255,255,255,0.9);
    padding: 8px 16px;
    border-radius: 8px;

    font-family: sans-serif;
  }
  </style>
</head>
<body>

<h1 id="title">23 mile hike to Half Moon Bay from Stanford Campus</h1>
<div id="map"></div>

<script>
  var map = L.map('map');

  // Topographic layer
  L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenTopoMap'
  }).addTo(map);

  // Load your GPX file
  new L.GPX("Morning_Walk.gpx", {
    async: true,
    marker_options: {
      startIconUrl: null,
      endIconUrl: null,
      shadowUrl: null
    }
  }).on('loaded', function(e) {
    map.fitBounds(e.target.getBounds());
  }).addTo(map);

</script>

</body>
</html>
