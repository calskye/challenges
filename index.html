<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Keeping of Personal Challenges/Projects</title>

  <!-- Monospace (coding-style) font -->
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --seafoam: #f7f766;
      --seafoam-light: #A8E6CF;
      --dark: #ffffff;
      --card: #ffffff;
      --text: #000000;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Fira Code', monospace;
      background: var(--dark);
      color: var(--text);
      line-height: 1.6;
    }

    header {
      background: linear-gradient(135deg, var(--seafoam), var(--seafoam-light));
      color: #003b2f;
      padding: 40px 20px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      font-size: 2rem;
      font-weight: 500;
    }

    .container {
      max-width: 1100px;
      margin: 40px auto;
      padding: 0 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: var(--card);
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.3);
      text-decoration: none;
      color: var(--text);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      border-left: 5px solid var(--seafoam);
    }

    .card:hover {
      transform: scale(1.03);
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }

    .card img {
      width: 100%;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .card h3 {
      margin: 10px 0 5px;
      font-weight: 500;
    }

    .card p {
      font-size: 0.9rem;
      color: #555;
    }

  </style>
</head>

<body>

<header>
  Book Keeping of Personal Challenges/Projects
</header>

<div class="container">

  <a class="card" href="stuff/seal_pcb.html">
    <img src="stuff/seal_pbc/seal_image.jpeg" alt="Seal PCB">
    <h3>Designed + fabbed a seal shaped PCB</h3>
    <p>12.12.2025</p>
  </a>

  <a class="card" href="stuff/hmb_hike.html">
    <img src="stuff/hmb_hike/hmb_image.jpeg" alt="Half Moon Bay hike">
    <h3>23 Mile Hike to Half Moon Bay</h3>
    <p>04.25.2026</p>
  </a>

</div>

</body>
</html>
