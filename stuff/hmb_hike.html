<!DOCTYPE html>
<html>
<head>
  <title>23 mile hike to Half Moon Bay from Stanford</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <!-- GPX plugin -->
  <script src="https://unpkg.com/leaflet-gpx/gpx.js"></script>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      font-family: sans-serif;
    }

    #container {
      display: flex;
      height: 100vh;
      width: 100%;
    }

    #map {
      flex: 2;
      height: 100%;
    }

    #sidebar {
      flex: 1;
      overflow-y: scroll;
      padding: 15px;
      background: #f7f7f7;
      border-left: 1px solid #ddd;
    }

    #sidebar img {
      width: 100%;
      margin-bottom: 12px;
      border-radius: 8px;
    }

    #title {
      position: absolute;
      bottom: 20px;
      left: 20px;
      z-index: 1000;
      background: rgba(255,255,255,0.8);
      padding: 14px 20px;
      border-radius: 12px;
      font-size: 28px;
      font-weight: bold;
      color: hotpink;
    }

    #back-button {
      position: absolute;
      top: 20px;
      right: 20px;
      z-index: 1000;
      background: rgba(255,255,255,0.9);
      padding: 10px 14px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      color: black;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }
  </style>
</head>

<body>

<div id="title">04/25/2026 ~ My 23 mile hike to Half Moon Bay from Stanford</div>

<!-- IMPORTANT: go up one level to reach index.html -->
<a href="../index.html" id="back-button">← Back</a>

<div id="container">
  <div id="map"></div>

  <div id="sidebar">
    <h2>Photos</h2>

    <img src="hmb_hike/slug_image.jpeg">
    <p>Banana slug!</p>

    <img src="hmb_hike/salamander_image.jpeg">
    <p>First ever IRL salamander sighting!</p>

    <img src="hmb_hike/hmb_image.jpeg">
    <p>Finally made it 22 miles later!</p>

    <img src="hmb_hike/cookie_image.jpeg">
    <p>Funny looking owl cookies found in HMB!</p>
  </div>
</div>

<script>
  var map = L.map('map').setView([37.4, -122.2], 10);

  L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenTopoMap'
  }).addTo(map);

  window.addEventListener('load', () => {
    map.invalidateSize();
  });

  new L.GPX("hmb_hike/Morning_Walk.gpx", {
    async: true,
    polyline_options: {
      color: "red",
      weight: 4
    },
    marker_options: {
      startIconUrl: null,
      endIconUrl: null,
      shadowUrl: null
    }
  }).on('loaded', function(e) {
    map.fitBounds(e.target.getBounds());
  }).addTo(map);
</script>

</body>
</html>
