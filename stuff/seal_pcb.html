<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LED Seal PCB Design</title>

  <!-- Monospace (coding-style) font -->
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --seafoam: #3EB489;
      --seafoam-light: #A8E6CF;
      --dark: #1e1e1e;
      --card: #2a2a2a;
      --text: #eaeaea;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Fira Code', monospace;
      background: var(--dark);
      color: var(--text);
      line-height: 1.6;
    }

    header {
      background: linear-gradient(135deg, var(--seafoam), var(--seafoam-light));
      color: #003b2f;
      padding: 40px 20px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }

    header h1 {
      font-weight: 500;
      font-size: 2.5rem;
    }

    .container {
      max-width: 1100px;
      margin: 40px auto;
      padding: 0 20px;
    }

    h2 {
      margin-bottom: 15px;
      color: var(--seafoam-light);
    }

    /* Image Gallery */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
      margin-bottom: 40px;
    }

    .gallery img {
      width: 100%;
      border-radius: 10px;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .gallery img:hover {
      transform: scale(1.03);
      box-shadow: 0 10px 20px rgba(0,0,0,0.4);
    }

    /* Text Card */
    .card {
      background: var(--card);
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.3);
      border-left: 5px solid var(--seafoam);
    }

    p {
      margin-bottom: 15px;
    }

    footer {
      text-align: center;
      padding: 20px;
      margin-top: 40px;
      color: #888;
      font-size: 0.9rem;
    }

  </style>
</head>

<body>

<header>
  <h1>LED Seal PCB Design</h1>
</header>

<div class="container">

  <!-- Image Section -->
  <section>
    <h2>Project Gallery</h2>
    <div class="gallery">
      <img src="image1.jpg" alt="PCB Image 1">
      <img src="image2.jpg" alt="PCB Image 2">
      <img src="image3.jpg" alt="PCB Image 3">
    </div>
  </section>

  <!-- Text Section -->
  <section class="card">
    <h2>About the Project</h2>
    <p>
      Now I guess I have to talk about it!
    </p>
    <p>
      
    </p>
  </section>

</div>

<footer>
  <p>2026 LED Seal Project</p>
</footer>

</body>
</html>
